name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (tolerant)
        run: npm run -s lint || echo "No lint script found, skipping lint"

      - name: Test with coverage (Vitest)
        run: |
          if npm run -s test -- --coverage; then
            echo "Tests completed";
          else
            echo "No test script or tests failed";
            exit 1;
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
          retention-days: 7
